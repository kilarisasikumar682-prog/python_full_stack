
<style>
/* ═══════════ CHAT WIDGET STYLES ═══════════ */
:root {
  --chat-bg:       #0e0e14;
  --chat-bg2:      #16161f;
  --chat-border:   rgba(255,255,255,0.08);
  --chat-accent:   #7c6af7;
  --chat-accent2:  #a99bff;
  --chat-green:    #22c55e;
  --chat-red:      #ef4444;
  --chat-gold:     #f59e0b;
  --chat-text:     #f0eff4;
  --chat-text2:    #9997b0;
  --chat-text3:    #4a4860;
}

/* FAB button */
#chat-fab {
  position: fixed;
  bottom: 28px; right: 28px;
  width: 58px; height: 58px;
  background: linear-gradient(135deg, var(--chat-accent), #4a3fd4);
  border-radius: 50%;
  box-shadow: 0 8px 32px rgba(124,106,247,0.45);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem;
  z-index: 1000;
  transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  border: none;
  animation: fabIn 0.5s 1s cubic-bezier(0.34,1.56,0.64,1) both;
  color:white;
}
@keyframes fabIn {
  from { opacity:0; transform:scale(0) rotate(-180deg); }
  to   { opacity:1; transform:scale(1) rotate(0deg); }
}
#chat-fab:hover { transform: scale(1.1); box-shadow: 0 12px 40px rgba(124,106,247,0.6); }
#chat-fab.open  { transform: scale(1) rotate(45deg); }

/* Unread badge */
.chat-badge {
  position: absolute;
  top: -4px; right: -4px;
  min-width: 20px; height: 20px;
  background: var(--chat-red);
  border-radius: 100px;
  border: 2px solid var(--bg, #08080a);
  font-size: 0.65rem; font-weight: 700;
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  padding: 0 4px;
  display: none;
  animation: badgePop 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes badgePop { from{transform:scale(0)} to{transform:scale(1)} }

/* Chat window */
#chat-window {
  position: fixed;
  bottom: 100px; right: 28px;
  width: 380px;
  max-height: 580px;
  background: var(--chat-bg);
  border: 1px solid var(--chat-border);
  border-radius: 20px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
  z-index: 999;
  display: flex; flex-direction: column;
  overflow: hidden;
  transform-origin: bottom right;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  transform: scale(0) translateY(20px);
  opacity: 0;
  pointer-events: none;
}
#chat-window.open {
  transform: scale(1) translateY(0);
  opacity: 1;
  pointer-events: all;
}
@media (max-width: 440px) {
  #chat-window { width: calc(100vw - 32px); right: 16px; bottom: 90px; }
}

/* Chat header */
.cw-header {
  background: linear-gradient(135deg, #0c0b18, #130f2a);
  border-bottom: 1px solid var(--chat-border);
  padding: 16px 18px;
  display: flex; align-items: center; gap: 12px;
  flex-shrink: 0;
}
.cw-avatar {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--chat-accent), #4a3fd4);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; flex-shrink: 0;
  position: relative;
}
.cw-online {
  position: absolute; bottom: 0; right: 0;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--chat-green);
  border: 2px solid var(--chat-bg);
  box-shadow: 0 0 8px rgba(34,197,94,0.6);
}
.cw-info { flex: 1; min-width: 0; }
.cw-name {
  font-family: 'Syne', sans-serif;
  font-size: 0.9rem; font-weight: 700;
  color: var(--chat-text); margin-bottom: 2px;
}
.cw-status-text {
  font-size: 0.7rem; color: var(--chat-green);
  display: flex; align-items: center; gap: 5px;
}
.cw-status-text::before {
  content: '●'; font-size: 0.5rem;
  animation: onlinePulse 2s ease infinite;
}
@keyframes onlinePulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.cw-close {
  background: rgba(255,255,255,0.06); border: none;
  width: 28px; height: 28px; border-radius: 50%;
  color: var(--chat-text2); font-size: 0.85rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
}
.cw-close:hover { background: rgba(255,255,255,0.12); color: var(--chat-text); }

/* Status bar */
.cw-status-bar {
  background: rgba(124,106,247,0.08);
  border-bottom: 1px solid rgba(124,106,247,0.15);
  padding: 7px 16px;
  font-size: 0.72rem; color: var(--chat-accent2);
  display: flex; align-items: center; gap: 6px;
  flex-shrink: 0;
  transition: all 0.3s;
}
.cw-status-bar.waiting { background:rgba(245,158,11,0.08); border-color:rgba(245,158,11,0.2); color:var(--chat-gold); }
.cw-status-bar.active  { background:rgba(34,197,94,0.08);  border-color:rgba(34,197,94,0.2);  color:var(--chat-green); }

/* Messages area */
.cw-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}
.cw-messages::-webkit-scrollbar { width: 4px; }
.cw-messages::-webkit-scrollbar-track { background: transparent; }
.cw-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 100px; }

/* Message bubbles */
.msg-col {
  display: flex; gap: 8px; align-items: flex-end;
  animation: msgIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes msgIn {
  from { opacity:0; transform: translateY(8px) scale(0.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}
.msg-row.customer { flex-direction: row-reverse; }
.msg-row.system   { justify-content: center; }
.msg-row.rating   { justify-content: center; }

.msg-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; flex-shrink: 0; margin-bottom: 2px;
}
.msg-avatar.bot    { background: linear-gradient(135deg,var(--chat-accent),#4a3fd4); }
.msg-avatar.agent  { background: linear-gradient(135deg,#2r43e,#16a34a); }

.msg-bubble {
  max-width: 78%;
  padding: 11px 14px;
  border-radius: 14px;
  font-size: 0.83rem;
  line-height: 1.65;
  word-break: break-word;
}
.msg-bubble.bot {
  background: var(--chat-bg2);
  border: 1px solid var(--chat-border);
  color: var(--chat-text);
  border-bottom-left-radius: 4px;
}
.msg-bubble.agent {
  background: cyan;
  border: 1px solid rgba(34,197,94,0.2);
  color: var(--chat-text);
  border-bottom-left-radius: 4px;
}
.msg-bubble.customer {
  background: linear-gradient(135deg, var(--chat-accent), #4a3fd4);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.msg-bubble.system {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  color: var(--chat-text2);
  font-size: 0.75rem;
  text-align: center;
  padding: 7px 14px;
  border-radius: 100px;
  max-width: 90%;
}
.msg-time {
  font-size: 0.65rem; color: var(--chat-text3);
  margin-top: 3px;
  display: block;
  text-align: right;
}
.msg-row.customer .msg-time { text-align: right; }
.msg-row.bot .msg-time, .msg-row.agent .msg-time { text-align: left; }

/* Markdown-like rendering in bot messages */
.msg-bubble strong { font-weight: 700; color: var(--chat-accent2); }
.msg-bubble em     { font-style: italic; opacity: 0.8; }

/* Typing indicator */
.typing-indicator {
  display: flex; align-items: center; gap: 4px;
  padding: 10px 14px;
  background: var(--chat-bg2);
  border: 1px solid var(--chat-border);
  border-radius: 14px; border-bottom-left-radius: 4px;
  width: fit-content;
  animation: msgIn 0.3s ease;
}
.typing-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--chat-text3);
  animation: typeDot 1.2s ease infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typeDot {
  0%,80%,100%{transform:translateY(0);opacity:0.4}
  40%{transform:translateY(-6px);opacity:1}
}

/* Quick replies */
.quick-replies {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 0 16px 12px;
  flex-shrink: 0;
}
.qr-btn {
  font-size: 0.75rem; font-weight: 500;
  color: var(--chat-accent2);
  background: rgba(124,106,247,0.08);
  border: 1px solid rgba(124,106,247,0.2);
  padding: 6px 12px; border-radius: 100px;
  cursor: pointer; transition: all 0.15s;
  white-space: nowrap;
}
.qr-btn:hover { background: rgba(124,106,247,0.18); border-color: rgba(124,106,247,0.4); }

/* Input area */
.cw-input-area {
  border-top: 1px solid var(--chat-border);
  padding: 12px 14px;
  display: flex; gap: 8px; align-items: flex-end;
  flex-shrink: 0;
  background: var(--chat-bg);
}
.cw-textarea {
  flex: 1;
  background: var(--chat-bg2);
  border: 1px solid var(--chat-border);
  border-radius: 12px;
  padding: 10px 14px;
  color: var(--chat-text);
  font-family: 'Instrument Sans', sans-serif;
  font-size: 0.84rem;
  resize: none;
  outline: none;
  max-height: 100px;
  min-height: 40px;
  line-height: 1.5;
  transition: border-color 0.2s;
  overflow-y: auto;
}
.cw-textarea::placeholder { color: var(--chat-text3); }
.cw-textarea:focus { border-color: rgba(124,106,247,0.4); }
.cw-send {
  width: 38px; height: 38px;
  background: var(--chat-accent);
  border: none; border-radius: 10px;
  color: #fff; font-size: 1rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
}
.cw-send:hover { background: #4a3fd4; transform: scale(1.05); }
.cw-send:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

/* Rating panel */
.rating-panel {
  padding: 16px;
  border-top: 1px solid var(--chat-border);
  text-align: center; flex-shrink: 0;
}
.rating-title { font-size: 0.82rem; color: var(--chat-text2); margin-bottom: 10px; }
.rating-stars { display: flex; justify-content: center; gap: 6px; margin-bottom: 10px; }
.star-btn {
  font-size: 1.4rem; cursor: pointer; transition: transform 0.15s;
  background: none; border: none;
  filter: grayscale(1) opacity(0.4);
}
.star-btn:hover, .star-btn.selected { filter: none; transform: scale(1.2); }
.rating-submit {
  background: var(--chat-accent);
  color: #fff; border: none; border-radius: 8px;
  padding: 8px 20px; font-size: 0.8rem; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
}
.rating-submit:hover { background: #4a3fd4; }
</style>

<!-- FAB Button -->
<button id="chat-fab" onclick="toggleChat()" title="Chat with Support">
  💬
  <span class="chat-badge" id="chat-badge">0</span>
</button>

<!-- Chat Window -->
<div id="chat-window">
  <!-- Header -->
  <div class="cw-header">
    <div class="cw-avatar">
      🤖
      <div class="cw-online"></div>
    </div>
    <div class="cw-info">
      <div class="cw-name">PyBank Support</div>
      <div class="cw-status-text" id="cw-status-line">Online · Typically replies instantly</div>
    </div>
    <button class="cw-close" onclick="toggleChat()">✕</button>
	
  </div>

  <!-- Status bar -->
  <div class="cw-status-bar" id="cw-status-bar">
    🤖 PyBot is handling your chat
  </div>

  <!-- Messages -->
  <div class="cw-messages" id="cw-messages">
    <div style="text-align:center;padding:20px;color:var(--chat-text3);font-size:0.8rem">
      Starting conversation...
    </div>
  </div>

  <!-- Quick replies (shown initially) -->
  <div class="quick-replies" id="quick-replies">
    <button class="qr-btn" onclick="quickReply('Check my balance')">💰 Balance</button>
    <button class="qr-btn" onclick="quickReply('How do I transfer money?')">📲 Transfer</button>
    <button class="qr-btn" onclick="quickReply('What is my CIBIL score?')">📊 CIBIL</button>
    <button class="qr-btn" onclick="quickReply('I forgot my PIN')">🔐 Forgot PIN</button>
    <button class="qr-btn" onclick="quickReply('Connect me to a human agent')">🎧 Human Agent</button>
  </div>

  <!-- Rating panel (shown when chat closes) -->
  <div class="rating-panel" id="rating-panel" style="display:none">
    <div class="rating-title">How was your experience?</div>
    <div class="rating-stars" id="rating-stars">
      <button class="star-btn" data-val="1" onclick="selectStar(1)">⭐</button>
      <button class="star-btn" data-val="2" onclick="selectStar(2)">⭐</button>
      <button class="star-btn" data-val="3" onclick="selectStar(3)">⭐</button>
      <button class="star-btn" data-val="4" onclick="selectStar(4)">⭐</button>
      <button class="star-btn" data-val="5" onclick="selectStar(5)">⭐</button>
    </div>
    <button class="rating-submit" onclick="submitRating()">Submit Rating</button>
  </div>

  <!-- Input -->
  <div class="cw-input-area" id="cw-input-area">
    <textarea class="cw-textarea" id="cw-input" placeholder="Type a message..."
      rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="cw-send" id="cw-send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  CHAT WIDGET JS
// ═══════════════════════════════════════════════════════
let chatToken    = null;
let chatOpen     = false;
let lastMsgId    = 0;
let pollTimer    = null;
let selectedRating = 0;
let chatStatus   = 'bot';
let unreadCount  = 0;

// ── Helpers ────────────────────────────────────────────
function fmtTime(dt) {
  if (!dt) return '';
  const d = new Date(dt);
  return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

function renderMarkdown(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// ── Toggle window ──────────────────────────────────────
function toggleChat() {
  chatOpen = !chatOpen;
  const win = document.getElementById('chat-window');
  const fab = document.getElementById('chat-fab');
  win.classList.toggle('open', chatOpen);
  fab.classList.toggle('open', chatOpen);

  if (chatOpen) {
    if (!chatToken) initChat();
    clearBadge();
    scrollToBottom();
    document.getElementById('cw-input').focus();
  }
}

function clearBadge() {
  unreadCount = 0;
  const badge = document.getElementById('chat-badge');
  badge.style.display = 'none';
  badge.textContent = '0';
}

function showBadge(n) {
  const badge = document.getElementById('chat-badge');
  badge.textContent = n > 99 ? '99+' : n;
  badge.style.display = 'flex';
}

// ── Init chat ──────────────────────────────────────────
async function initChat() {
  try {
    const res  = await fetch('/api/chat/init', {method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    const data = await res.json();
    if (data.success) {
      chatToken  = data.token;
      chatStatus = data.status;
      document.getElementById('cw-messages').innerHTML = '';
      lastMsgId = 0;
      await pollMessages();
      startPolling();
    }
  } catch(e) { console.error('Chat init error:', e); }
}

// ── Polling ────────────────────────────────────────────
function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(pollMessages, 2500);
}

async function pollMessages() {
  if (!chatToken) return;
  try {
    const res  = await fetch('/api/chat/poll', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({token: chatToken, since_id: lastMsgId})
    });
    const data = await res.json();
    if (data.success) {
      updateStatusBar(data.status);
      chatStatus = data.status;
      if (data.messages && data.messages.length > 0) {
        data.messages.forEach(appendMessage);
        lastMsgId = data.messages[data.messages.length-1].id;
        if (!chatOpen) {
          // Count incoming messages (not from customer)
          const incoming = data.messages.filter(m => m.sender_type !== 'customer').length;
          if (incoming > 0) {
            unreadCount += incoming;
            showBadge(unreadCount);
            // Pulse FAB
            document.getElementById('chat-fab').style.animation = 'none';
            setTimeout(() => document.getElementById('chat-fab').style.animation = '', 50);
          }
        } else {
          scrollToBottom();
        }
      }
      // If closed by agent, show rating
      if (data.status === 'closed' && chatStatus !== 'closed') {
        showRatingPanel();
      }
    }
  } catch(e) {}
}

// ── Append message ─────────────────────────────────────
function appendMessage(msg) {
  const container = document.getElementById('cw-messages');
  const row = document.createElement('div');
  row.className = `msg-row ${msg.sender_type}`;

  const isSys     = msg.sender_type === 'system' || msg.sender_type === 'rating';
  const isCustomer = msg.sender_type === 'customer';
  const isBot     = msg.sender_type === 'bot';
  const isAgent   = msg.sender_type === 'agent';

  if (isSys) {
    row.innerHTML = `<div class="c">${renderMarkdown(msg.message)}</div>`;
  } else {
    const avatarHtml = (isBot || isAgent)
      ? `<div class="msg-avatar ${msg.sender_type}">${isBot ? '🤖' : '🎧'}</div>` : '';
    row.innerHTML = `
      ${avatarHtml}
      <div>
        <div class="msg-bubble ${msg.sender_type}">${renderMarkdown(msg.message)}</div>
        <span class="msg-time">${msg.sender_name !== 'Unknown' && !isCustomer ? msg.sender_name + ' · ' : ''}${fmtTime(msg.created_at)}</span>
      </div>`;
  }
  container.appendChild(row);

  // Hide quick replies after first real message
  if (isCustomer || isBot) {
    const qr = document.getElementById('quick-replies');
    if (qr && msg.sender_type === 'customer') qr.style.display = 'none';
  }
}

// ── Status bar ─────────────────────────────────────────
function updateStatusBar(status) {
  const bar  = document.getElementById('cw-status-bar');
  const line = document.getElementById('cw-status-line');
  bar.className = 'cw-status-bar ' + status;
  if (status === 'bot') {
    bar.innerHTML = '🤖 PyBot is handling your chat';
    line.textContent = 'Online · Typically replies instantly';
    document.querySelector('.cw-avatar').textContent = '🤖';
  } else if (status === 'waiting') {
    bar.innerHTML = '⏳ Waiting for a human agent...';
    line.textContent = 'Connecting to support team';
    document.querySelector('.cw-avatar').textContent = '⏳';
  } else if (status === 'active') {
    bar.innerHTML = '🎧 Connected with a support agent';
    line.textContent = 'Live agent · Online now';
    document.querySelector('.cw-avatar').textContent = '🎧';
  } else if (status === 'closed') {
    bar.innerHTML = '✅ Chat session closed';
    line.textContent = 'Session ended';
    document.querySelector('.cw-avatar').textContent = '✅';
  }
}

// ── Scroll ─────────────────────────────────────────────
function scrollToBottom() {
  const msgs = document.getElementById('cw-messages');
  setTimeout(() => { msgs.scrollTop = msgs.scrollHeight; }, 50);
}

// ── Send message ───────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('cw-input');
  const msg   = input.value.trim();
  if (!msg || !chatToken) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('cw-send-btn').disabled = true;

  // Optimistic UI
  appendMessage({sender_type:'customer',sender_name:'You',message:msg,created_at:new Date().toISOString()});
  scrollToBottom();

  // Show typing if bot
  let typingEl = null;
  if (chatStatus === 'bot') {
    typingEl = showTyping();
  }

  try {
    const res  = await fetch('/api/chat/send', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({token:chatToken, message:msg})
    });
    const data = await res.json();
    if (typingEl) { typingEl.remove(); typingEl = null; }
    if (data.success && data.replies) {
      data.replies.forEach(r => {
        appendMessage({...r, created_at: new Date().toISOString()});
        lastMsgId = 0; // force re-poll to sync IDs
      });
      scrollToBottom();
      await pollMessages(); // resync IDs
    }
  } catch(e) {
    if (typingEl) typingEl.remove();
  }
  document.getElementById('cw-send-btn').disabled = false;
  input.focus();
  document.getElementById('quick-replies').style.display = 'none';
}

function showTyping() {
  const container = document.getElementById('cw-messages');
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typing-row';
  row.innerHTML = `
    <div class="msg-avatar bot">🤖</div>
    <div class="typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>`;
  container.appendChild(row);
  scrollToBottom();
  return row;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ── Quick reply ────────────────────────────────────────
async function quickReply(topic) {
  if (!chatToken) { await initChat(); }
  document.getElementById('quick-replies').style.display = 'none';

  // Show customer bubble
  appendMessage({sender_type:'customer',sender_name:'You',message:topic,created_at:new Date().toISOString()});
  scrollToBottom();
  const typingEl = showTyping();

  try {
    await fetch('/api/chat/quick', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({token:chatToken, topic})
    });
    if (typingEl) typingEl.remove();
    lastMsgId = 0;
    await pollMessages();
  } catch(e) { if(typingEl) typingEl.remove(); }
}

// ── Rating ─────────────────────────────────────────────
function showRatingPanel() {
  document.getElementById('rating-panel').style.display = 'block';
  document.getElementById('cw-input-area').style.display = 'none';
  document.getElementById('quick-replies').style.display = 'none';
}

function selectStar(val) {
  selectedRating = val;
  document.querySelectorAll('.star-btn').forEach((btn, i) => {
    btn.classList.toggle('selected', i < val);
  });
}

async function submitRating() {
  if (selectedRating === 0) { selectStar(5); }
  await fetch('/api/chat/rate', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({token:chatToken, rating:selectedRating})
  });
  document.getElementById('rating-panel').innerHTML =
    `<div style="padding:8px;font-size:0.85rem;color:var(--chat-green)">⭐ Thank you for your feedback!</div>`;
  if (pollTimer) clearInterval(pollTimer);
}

// ── Auto-init on load ──────────────────────────────────
window.addEventListener('load', () => {
  // Pre-init token silently so first open is instant
  setTimeout(async () => {
    if (!chatToken) {
      try {
        const res  = await fetch('/api/chat/init',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
        const data = await res.json();
        if (data.success) {
          chatToken  = data.token;
          chatStatus = data.status;
          startPolling();
        }
      } catch(e) {}
    }
  }, 2000);
});
</script>
